name: scrib
description: A lecture transcription and note-generation platform.
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  flutter:
    sdk: flutter
  record: ^6.2.0
  permission_handler: ^11.3.0
  http: ^1.2.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.4.0
  intl: ^0.19.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
 
flutter:
  uses-material-design: true
  assets:
    - assets/
